<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Virtual Try-On</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 50px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .hero {
      text-align: center;
      margin-top: 30px;
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 10px;
      color: #cbd5f5;
    }

    .container {
      margin: auto;
      width: 90%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }

    .upload-box {
      border: 2px dashed #38bdf8;
      padding: 20px;
      border-radius: 15px;
      margin: 15px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      background: rgba(255,255,255,0.1);
    }

    input {
      display: none;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 30px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      border: none;
      border-radius: 30px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #22c55e;
    }

    .preview {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 10px;
    }

    .preview img {
      width: 48%;
      border-radius: 10px;
      border: 2px solid #38bdf8;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>👕 AI Try-On Studio</header>

<div class="hero">
  <h1>Try Clothes Virtually</h1>
  <p>Upload your photo and outfit — see magic instantly</p>
</div>

<div class="container">

  <label class="upload-box">
    Upload Your Photo
    <input type="file" id="person" accept="image/*">
  </label>

  <label class="upload-box">
    Upload Clothing Image
    <input type="file" id="cloth" accept="image/*">
  </label>

  <button class="btn" onclick="previewImages()">✨ Try Now</button>

  <div class="preview">
    <img id="personPreview" src="" alt="">
    <img id="clothPreview" src="" alt="">
  </div>

</div>

<footer>© 2026 AI Fashion | Premium Experience</footer>

<script>
function previewImages() {
  const person = document.getElementById('person').files[0];
  const cloth = document.getElementById('cloth').files[0];

  if (person) {
    document.getElementById('personPreview').src = URL.createObjectURL(person);
  }

  if (cloth) {
    document.getElementById('clothPreview').src = URL.createObjectURL(cloth);
  }

  alert("Next step: connect AI backend 🚀");
}
</script>

</body>
</html>
