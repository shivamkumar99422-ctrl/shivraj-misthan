<!DOCTYPE html>
<html>
<head>
<title>Shivraj Misthan</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fff8e1;
}

nav{
background:#ff9800;
padding:15px;
display:flex;
justify-content:space-between;
color:white;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

.hero{
text-align:center;
padding:60px;
background:#ffe0b2;
}

.sweets{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
width:200px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

footer{
background:#5d4037;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<nav>
<h2>Shivraj Misthan</h2>

<ul>
<li>Home</li>
<li>Sweets</li>
<li>Contact</li>
</ul>
</nav>

<section class="hero">
<h1>Welcome to Shivraj Misthan</h1>
<p>Fresh Traditional Indian Sweets</p>
</section>

<section class="sweets">

<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<h3>Rasgulla</h3>
<p>₹250/kg</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615485290382-441e4d049cb5">
<h3>Gulab Jamun</h3>
<p>₹300/kg</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7">
<h3>Laddu</h3>
<p>₹280/kg</p>
</div>

</section>

<footer>

<p>© 2026 Shivraj Misthan</p>
<p>Fresh sweets made daily</p>

</footer>

</body>
</html>
