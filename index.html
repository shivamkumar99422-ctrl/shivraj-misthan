<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
}

nav ul {
  display: flex;
  gap: 25px;
  list-style: none;
}

nav ul li:hover {
  color: #00d4ff;
  cursor: pointer;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 50px;
  flex-wrap: wrap;
}

.hero-text {
  max-width: 500px;
}

.hero h2 {
  font-size: 50px;
}

.glow {
  background: linear-gradient(90deg, #00d4ff, #00ffcc);
  -webkit-background-clip: text;
  color: transparent;
}

.typing {
  font-size: 20px;
  margin-top: 10px;
  color: #00d4ff;
}

.hero img {
  width: 300px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,212,255,0.5);
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(90deg, #00d4ff, #00ffcc);
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.1);
}

/* Section */
.section {
  padding: 80px 50px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

/* Card */
.card {
  width: 280px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

/* Project Image */
.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<nav>
  <h1>Shivam</h1>
  <ul>
    <li>Home</li>
    <li>Projects</li>
    <li>Contact</li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-text" data-aos="fade-right">
    <h2>Hi, I'm <span class="glow">Shivam</span></h2>
    <div class="typing" id="typing"></div>
    <button class="btn">Hire Me</button>
  </div>

  <img src="https://via.placeholder.com/300" alt="Your Photo" data-aos="fade-left">
</div>

<!-- PROJECTS -->
<div class="section">
  <h2 data-aos="fade-up">My Projects 🚀</h2>

  <div class="cards">

    <div class="card" data-aos="fade-up">
      <img src="https://via.placeholder.com/300x200">
      <h3>Food Delivery App</h3>
      <p>Android app with login system.</p>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="200">
      <img src="https://via.placeholder.com/300x200">
      <h3>AI Chatbot</h3>
      <p>Smart chatbot using AI concepts.</p>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="400">
      <img src="https://via.placeholder.com/300x200">
      <h3>Portfolio Website</h3>
      <p>Modern personal portfolio.</p>
    </div>

  </div>
</div>

<footer>
  © 2026 Shivam | Portfolio 🔥
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

/* Typing Effect */
const text = ["Web Developer 💻", "AI/ML Learner 🤖", "Future Engineer 🚀"];
let i = 0, j = 0;
let currentText = "";
let isDeleting = false;

function type() {
  currentText = text[i];

  if (!isDeleting) {
    document.getElementById("typing").innerHTML = currentText.substring(0, j++);
    if (j > currentText.length) {
      isDeleting = true;
      setTimeout(type, 1000);
      return;
    }
  } else {
    document.getElementById("typing").innerHTML = currentText.substring(0, j--);
    if (j == 0) {
      isDeleting = false;
      i = (i + 1) % text.length;
    }
  }

  setTimeout(type, isDeleting ? 50 : 100);
}

type();
</script>

</body>
</html>
